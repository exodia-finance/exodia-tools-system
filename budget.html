<style>
    .budget-wrap { padding: 12px 20px; }

    .budget-card {
  background: #fff;
  border: 1px solid #ead7c3;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
  
    .budget-title {
  margin: 0 0 8px 0;
  font-size: 24px;
  font-weight: 700;
}

    .budget-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 12px;
}

    .budget-field label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .budget-field input,
    .budget-field select,
    .budget-field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d6a067;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;

    .budget-field textarea {

      resize: vertical;
    }

    .budget-top-menu {
  margin-bottom: 2px;
}
    .budget-actions {
  display: flex;

  flex-wrap: wrap;

}

    .budget-btn {
      border: 1px solid #d67d1f;
      background: #ff7a00;
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .budget-btn.secondary {
      background: #fffaf5;
      color: #7a4a00;
    }

    .budget-hidden {
      display: none;
    }

    .budget-table-wrap {
      overflow-x: auto;
      margin-top: 12px;
    }

    .budget-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      min-width: 760px;
    }

    .budget-table th,
    .budget-table td {
      border: 1px solid #ead7c3;
      padding: 10px;
      text-align: left;
      vertical-align: middle;
    }

    .budget-table th {
      background: #141414;
      color: #fff;
      white-space: nowrap;
    }

    .budget-table input {
  width: 100%;
  box-sizing: border-box;
  padding: 8px 10px;
  border: 1px solid #d6a067;
  border-radius: 8px;
  text-align: right;
  appearance: textfield;
  -moz-appearance: textfield;
}

.budget-table input::-webkit-outer-spin-button,
.budget-table input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

    .budget-muted {
      color: #666;
      font-size: 13px;
    }

    .budget-empty {
      padding: 16px;
      border: 1px dashed #d6a067;
      border-radius: 12px;
      background: #fffaf5;
    }

    .budget-result-box {
      border: 1px solid #ead7c3;
      border-radius: 12px;
      padding: 16px;
      background: #fffaf5;
      margin-bottom: 16px;
    }

    .budget-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin: 12px 0 18px 0;

    .budget-meta div {
      background: #fff;
      border: 1px solid #ead7c3;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .period-total-row td {
      font-weight: 700;
      background: #fff8ef;
    }

    .details-panel {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }

    .details-panel.show {
      display: flex;

    .details-card {
      width: min(900px, 100%);

      overflow: auto;
      background: #fff;
      border-radius: 16px;

    .details-header {
      display: flex;

      border: 1px solid #d6a067;

      color: #7a4a00;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;

    .mini-link {

</head>

  <script>
    let latestBudgetResult = null;
let currentBudgetContext = null;
let savedBudgetsHistory = [];

    const SUPABASE_URL = "https://vtglfaeyvmciieuntzhs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_E1idmqAS85V-IVFdOqqV_w_smrIsLuP";

let sb = null;
let LIVE_COA = [];
let DEPARTMENT_DETAILS = {};
let BUDGET_GROUPS = [];

function normalizeBudgetAccountName(accountName = "") {
  const raw = String(accountName || "").trim();
  return raw.replace(/^\d+\s*-\s*/, "").trim();
}

function getDepartmentGroupFromAccountName(accountName = "") {
  const name = normalizeBudgetAccountName(accountName);

  if (!name) return "Company";

  if (name === "Facilities Department Expense - General" || name.startsWith("FE - ")) return "Facilities";
  if (name === "Finance Department Expense - General" || name.startsWith("Fine - ")) return "Finance";
  if (name === "Human Resource Department Expense - General" || name.startsWith("HRE - ")) return "Human Resource";
  if (name === "Information Technology Department Expense - General" || name.startsWith("ITE - ")) return "Information Technology";
  if (name === "Marketing Department Expense - General" || name.startsWith("ME - ")) return "Marketing";
  if (name === "Operation Department Expense - General" || name.startsWith("OpEx - ")) return "Operation";
  if (name === "Sales Department Expense - General" || name.startsWith("SE - ")) return "Sales";
  if (name === "Chiefs Expense - General" || name.startsWith("ChiE - ")) return "Chiefs";

  return "Company";
}

function buildBudgetGroupsFromCOA(rows) {
  const grouped = {
    "Facilities": [],
    "Finance": [],
    "Human Resource": [],
    "Information Technology": [],
    "Marketing": [],
    "Operation": [],
    "Sales": [],
    "Chiefs": [],
    "Company": []
  };

  (rows || []).forEach(row => {
    const type = String(row.type || "").trim().toLowerCase();
    const name = String(row.name || row.account_name || "").trim();
    const isDeleted = row.is_deleted === true;

    if (!name || isDeleted) return;
    if (type !== "expense") return;

    const group = getDepartmentGroupFromAccountName(name);
    if (!grouped[group]) grouped[group] = [];
    grouped[group].push(name);
  });

  Object.keys(grouped).forEach(group => {
    grouped[group] = [...new Set(grouped[group])].sort((a, b) => a.localeCompare(b));
  });

  DEPARTMENT_DETAILS = grouped;
  BUDGET_GROUPS = Object.keys(grouped).filter(group => grouped[group].length > 0);
}

async function fetchLiveCOA() {
  if (!sb) throw new Error("Supabase is not initialized.");

  const { data, error } = await sb
    .from("coa_accounts")
    .select("id, code, name, type, normal, is_deleted, created_at")
    .order("code", { ascending: true });

  if (error) throw error;

  LIVE_COA = data || [];
  buildBudgetGroupsFromCOA(LIVE_COA);
}

async function initializeBudgetPage() {
  try {
    if (!window.supabase || !window.supabase.createClient) {
      throw new Error("Supabase library not loaded.");
    }

    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    await fetchLiveCOA();
    renderDepartmentBudgetRows();
  } catch (err) {
    console.error("Budget page init failed:", err);
    alert("Failed to load live Chart of Accounts for Budget. Please check Supabase settings.");
  }
}

    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar-menu");
      const overlay = document.getElementById("sidebar-overlay");
      if (!sidebar || !overlay) return;
      sidebar.classList.toggle("open");
      overlay.classList.toggle("show");
    }

    function closeSidebar() {
      const sidebar = document.getElementById("sidebar-menu");
      const overlay = document.getElementById("sidebar-overlay");
      if (!sidebar || !overlay) return;
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
    }

    function showBudgetSection(section) {
      const createSection = document.getElementById("budget-create-section");
      const resultsSection = document.getElementById("budget-results-section");

      if (section === "create") {
        createSection.classList.remove("budget-hidden");
        resultsSection.classList.add("budget-hidden");
      } else {
        createSection.classList.add("budget-hidden");
        resultsSection.classList.remove("budget-hidden");
      }
    }

    function formatMoney(value) {
      return Number(value || 0).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

function getOverallBudgetStatus(startDate, endDate) {
  const today = new Date();
  const start = new Date(String(startDate || "") + "T00:00:00");
  const end = new Date(String(endDate || "") + "T23:59:59");

  if (!startDate || !endDate || isNaN(start.getTime()) || isNaN(end.getTime())) {
    return "Unknown";
  }

  if (today < start) return "Upcoming";
  if (today > end) return "Expired";
  return "Active";
}

function getLineStatus(startDate, endDate, remaining) {
  const base = getOverallBudgetStatus(startDate, endDate);
  if (Number(remaining || 0) < 0) return "Over Budget";
  return base === "Active" ? "Within Budget" : base;
}

async function fetchActualTotalsByGroup(startDate, endDate) {
  if (!sb) throw new Error("Supabase is not initialized.");

  const { data, error } = await sb
    .from("journal_lines")
    .select("entry_date, account_name, debit, credit, company_id, is_deleted")
    .eq("company_id", "exodia-main")
    .or("is_deleted.is.null,is_deleted.eq.false")
    .gte("entry_date", startDate)
    .lte("entry_date", endDate);

  if (error) throw error;

  const totals = {};
  BUDGET_GROUPS.forEach(group => {
    totals[group] = 0;
  });

  (data || []).forEach(line => {
    const accountName = String(line.account_name || "").trim();
    const group = getDepartmentGroupFromAccountName(accountName);

    const debit = Number(line.debit || 0);
    const credit = Number(line.credit || 0);

    // Expense actual = debit - credit
    const actual = debit - credit;

    if (!totals[group]) totals[group] = 0;
    totals[group] += actual;
  });

  return totals;
}

    async function fetchActualBreakdownByGroup(startDate, endDate, groupName) {
  if (!sb) throw new Error("Supabase is not initialized.");

  const { data, error } = await sb
    .from("journal_lines")
    .select("entry_date, account_name, debit, credit, company_id, is_deleted")
    .eq("company_id", "exodia-main")
    .or("is_deleted.is.null,is_deleted.eq.false")
    .gte("entry_date", startDate)
    .lte("entry_date", endDate);

  if (error) throw error;

  const breakdown = {};

  (data || []).forEach(line => {
    const accountName = String(line.account_name || "").trim();
    const group = getDepartmentGroupFromAccountName(accountName);

    if (group !== groupName) return;

    const normalizedName = normalizeBudgetAccountName(accountName);
    const debit = Number(line.debit || 0);
    const credit = Number(line.credit || 0);
    const actual = debit - credit;

    if (!breakdown[normalizedName]) breakdown[normalizedName] = 0;
    breakdown[normalizedName] += actual;
  });

  return Object.entries(breakdown)
    .map(([expenseName, amount]) => ({ expenseName, amount }))
    .sort((a, b) => Math.abs(b.amount) - Math.abs(a.amount));
}
    
    function addMonths(date, months) {
  const d = new Date(date);
  const day = d.getDate();

  d.setMonth(d.getMonth() + months);

  if (d.getDate() < day) {
    d.setDate(0);
  }

  return d;
}

function formatDateForInput(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function autoSetEndDate() {
  const startInput = document.getElementById("budget-start-date");
  const endInput = document.getElementById("budget-end-date");
  const frequency = document.getElementById("budget-frequency").value;

  if (!startInput || !endInput || !startInput.value) return;

  const startDate = new Date(startInput.value + "T00:00:00");
  let endDate = new Date(startDate);

  if (frequency === "Monthly") {
    endDate = addMonths(startDate, 1);
  } else if (frequency === "Quarterly") {
    endDate = addMonths(startDate, 3);
  } else if (frequency === "Semi-Annual") {
    endDate = addMonths(startDate, 6);
  } else if (frequency === "Yearly") {
    endDate = addMonths(startDate, 12);
  }

  endDate.setDate(endDate.getDate() - 1);
  endInput.value = formatDateForInput(endDate);
}

    function renderDepartmentBudgetRows() {
      const tbody = document.getElementById("department-budget-body");
      tbody.innerHTML = "";

      BUDGET_GROUPS.forEach((group, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(group)}</td>
          <td>
            <input
              type="number"
              min="0"
              step="0.01"
              placeholder="0.00"
              class="department-budget-input"
              data-group-index="${index}"
              oninput="updateGrandTotal()"
            />
          </td>
          <td>
            <button type="button" class="budget-btn secondary" onclick="openDetailsPanel('${escapeJs(group)}')">View Details</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      const totalRow = document.createElement("tr");
      totalRow.className = "period-total-row";
      totalRow.innerHTML = `
        <td>Grand Total</td>
        <td id="grand-total-cell" style="text-align:right;">0.00</td>
        <td></td>
      `;
      tbody.appendChild(totalRow);

      updateGrandTotal();
    }

    function updateGrandTotal() {
      let total = 0;
      document.querySelectorAll(".department-budget-input").forEach(input => {
        total += Number(input.value || 0);
      });

      const cell = document.getElementById("grand-total-cell");
      if (cell) cell.textContent = formatMoney(total);
    }

    async function openDetailsPanel(groupName) {
  const panel = document.getElementById("details-panel");
  const title = document.getElementById("details-title");
  const subtitle = document.getElementById("details-subtitle");
  const body = document.getElementById("details-body");

  const startDate = currentBudgetContext?.startDate || latestBudgetResult?.startDate;
const endDate = currentBudgetContext?.endDate || latestBudgetResult?.endDate;

  title.textContent = `${groupName} Details`;
  subtitle.textContent = "Expense accounts and actual amounts inside this budget date range";
  body.innerHTML = `<tr><td colspan="2">Loading...</td></tr>`;

  panel.classList.add("show");

  try {
    const rows = await fetchActualBreakdownByGroup(startDate, endDate, groupName);

    if (!rows.length) {
      body.innerHTML = `<tr><td colspan="2">No transactions found for this group in the selected budget period.</td></tr>`;
      return;
    }

    body.innerHTML = rows.map(row => `
      <tr>
        <td>${escapeHtml(row.expenseName)}</td>
        <td style="text-align:right;">${formatMoney(row.amount)}</td>
      </tr>
    `).join("");
  } catch (err) {
    console.error("Failed to load detail breakdown:", err);
    body.innerHTML = `<tr><td colspan="2">Failed to load detail breakdown.</td></tr>`;
  }
}

    function closeDetailsPanel(event) {
      if (event && event.target && event.target.id !== "details-panel") return;
      const panel = document.getElementById("details-panel");
      panel.classList.remove("show");
    }

    async function createBudgetResult() {
 const budgetName = document.getElementById("budget-name").value.trim();
const budgetYear = document.getElementById("budget-year").value.trim();
const frequency = document.getElementById("budget-frequency").value;
const startDate = document.getElementById("budget-start-date").value;
const endDate = document.getElementById("budget-end-date").value;
const notes = document.getElementById("budget-notes").value.trim();

  if (!budgetName || !budgetYear || !startDate || !endDate) {

let grandActual = 0;

try {

} catch (actualErr) {

    };
  }),

};

await loadAllSavedBudgets();
renderBudgetResults();
openSavedBudget(savedBudget.id);
showBudgetSection("results");
alert("✅ Budget saved successfully!");
  } catch (err) {
    console.error("Budget save error:", err);
    alert("❌ Failed to save budget: " + (err.message || JSON.stringify(err)));
  }
}

    async function saveBudgetToSupabase({ budgetName, budgetYear, frequency, startDate, endDate, notes, groupBudgets }) {
  if (!sb) throw new Error("Supabase is not initialized.");

  const { data: budgetRow, error: budgetError } = await sb
    .from("budgets")
    .insert([{
  budget_name: budgetName,
  budget_year: budgetYear,
  frequency: frequency,
  start_date: startDate,
  end_date: endDate,
  notes: notes || null
}])
    
    .select("id")
    .single();

  if (budgetError) throw budgetError;

  const lineRows = groupBudgets.map(item => ({
    budget_id: budgetRow.id,
    group_name: item.group,
    amount: Number(item.amount || 0)
  }));

  const { error: linesError } = await sb
    .from("budget_lines")
    .insert(lineRows);

  if (linesError) throw linesError;

  return budgetRow;
}

    async function buildBudgetSummaryFromSavedData(budgetRow, lineRows) {
  const actualTotalsByGroup = await fetchActualTotalsByGroup(budgetRow.start_date, budgetRow.end_date);

  const groupBudgets = (lineRows || []).map(line => {
    const applied = Number(line.amount || 0);
    const actual = Number(actualTotalsByGroup[line.group_name] || 0);
    const remaining = applied - actual;

    return {
      group: line.group_name,
      amount: applied,
      actual,
      remaining,
      status: getLineStatus(budgetRow.start_date, budgetRow.end_date, remaining)
    };
  });

  const grandTotal = groupBudgets.reduce((sum, item) => sum + Number(item.amount || 0), 0);
  const grandActual = groupBudgets.reduce((sum, item) => sum + Number(item.actual || 0), 0);
  const grandRemaining = grandTotal - grandActual;

  return {
    id: budgetRow.id,
    budgetName: budgetRow.budget_name,
    budgetYear: budgetRow.budget_year,
    frequency: budgetRow.frequency,
    startDate: budgetRow.start_date,
    endDate: budgetRow.end_date,
    notes: budgetRow.notes || "",
    groupBudgets,
    grandTotal,
    grandActual,
    grandRemaining,
    overallStatus: getOverallBudgetStatus(budgetRow.start_date, budgetRow.end_date)
  };
}

async function loadAllSavedBudgets() {
  if (!sb) throw new Error("Supabase is not initialized.");

  const { data: budgets, error: budgetsError } = await sb
    .from("budgets")
    .select("id, budget_name, budget_year, frequency, start_date, end_date, notes, created_at")
    .order("created_at", { ascending: false });

  if (budgetsError) throw budgetsError;

  const history = [];

  for (const budget of (budgets || [])) {
    const { data: lines, error: linesError } = await sb
      .from("budget_lines")
      .select("budget_id, group_name, amount")
      .eq("budget_id", budget.id)
      .order("group_name", { ascending: true });

    if (linesError) throw linesError;

    const summary = await buildBudgetSummaryFromSavedData(budget, lines || []);
    history.push(summary);
  }

  savedBudgetsHistory = history;
}

    function renderBudgetResults() {

    box.innerHTML = "No budget created yet.";
    return;
  }

  const summaryRows = savedBudgetsHistory.map(item => `

      <td>${escapeHtml(item.budgetName)}</td>
      <td>${escapeHtml(String(item.budgetYear))}</td>
      <td>${escapeHtml(item.frequency || "-")}</td>
      <td>${escapeHtml(item.startDate || "-")}</td>
      <td>${escapeHtml(item.endDate || "-")}</td>
      <td style="text-align:right;">${formatMoney(item.grandTotal || 0)}</td>
      <td style="text-align:right;">${formatMoney(item.grandActual || 0)}</td>
      <td style="text-align:right;">${formatMoney(item.grandRemaining || 0)}</td>
      <td>${escapeHtml(item.overallStatus || "-")}</td>
      <td>
        <button type="button" class="budget-btn secondary" onclick="openSavedBudget('${escapeJs(item.id)}')">Open</button>
      </td>
    </tr>
  `).join("");

  box.innerHTML = `
    <div class="budget-result-box">
      <h3 style="margin-top:0;">Saved Budgets</h3>

      <div class="budget-table-wrap">
        <table class="budget-table">
          <thead>
            <tr>
              <th>Budget Name</th>
              <th>Year</th>
              <th>Frequency</th>
              <th>Start Date</th>
              <th>End Date</th>
              <th>Applied</th>
              <th>Actual</th>
              <th>Remaining</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${summaryRows}

        </table>
      </div>

      <div id="opened-budget-view" style="margin-top:20px;"></div>
    </div>
  `;
}

    function openSavedBudget(budgetId) {
  const selected = savedBudgetsHistory.find(item => item.id === budgetId);
  if (!selected) return;

  currentBudgetContext = selected;

  const container = document.getElementById("opened-budget-view");
  if (!container) return;

  const bodyHtml = selected.groupBudgets.map(item => `
    <tr>
      <td>${escapeHtml(item.group)}</td>
      <td style="text-align:right;">${formatMoney(item.amount)}</td>
      <td style="text-align:right;">${formatMoney(item.actual || 0)}</td>
      <td style="text-align:right;">${formatMoney(item.remaining || 0)}</td>
      <td>${escapeHtml(item.status || "-")}</td>
      <td>
        <button type="button" class="budget-btn secondary" onclick="openDetailsPanel('${escapeJs(item.group)}')">View Details</button>
      </td>
    </tr>
  `).join("");

  container.innerHTML = `
    <div class="budget-result-box">
      <h3 style="margin-top:0;">${escapeHtml(selected.budgetName)}</h3>

      <div class="budget-meta">
        <div><strong>Year:</strong><br>${escapeHtml(String(selected.budgetYear))}</div>
        <div><strong>Frequency:</strong><br>${escapeHtml(selected.frequency || "-")}</div>
        <div><strong>Start Date:</strong><br>${escapeHtml(selected.startDate || "-")}</div>
        <div><strong>End Date:</strong><br>${escapeHtml(selected.endDate || "-")}</div>
        <div><strong>Applied Budget:</strong><br>${formatMoney(selected.grandTotal || 0)}</div>
        <div><strong>Actual:</strong><br>${formatMoney(selected.grandActual || 0)}</div>
        <div><strong>Remaining:</strong><br>${formatMoney(selected.grandRemaining || 0)}</div>
        <div><strong>Status:</strong><br>${escapeHtml(selected.overallStatus || "-")}</div>
      </div>

      <div style="margin-bottom:16px;">
        <strong>Notes:</strong><br>
        ${escapeHtml(selected.notes || "-")}
      </div>

      <div class="budget-table-wrap">
        <table class="budget-table">
          <thead>
            <tr>
              <th>Department / Group</th>
              <th>Applied</th>
              <th>Actual</th>
              <th>Remaining</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${bodyHtml}
            <tr class="period-total-row">
              <td>Grand Total</td>
              <td style="text-align:right;">${formatMoney(selected.grandTotal || 0)}</td>
              <td style="text-align:right;">${formatMoney(selected.grandActual || 0)}</td>
              <td style="text-align:right;">${formatMoney(selected.grandRemaining || 0)}</td>
              <td>${escapeHtml(selected.overallStatus || "-")}</td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  `;
}

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeJs(value) {
      return String(value ?? "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'");
    }

    document.getElementById("budget-start-date").value = formatDateForInput(new Date());
autoSetEndDate();
