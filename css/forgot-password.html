<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    body{
      margin:0;
      font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fff6ef 0%, #ffe2cc 100%);
      min-height:100vh;
    }

    .fp-wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }

    .fp-card{
      width:100%;
      max-width:420px;
      background:#fff;
      border:1px solid #eadfd6;
      border-radius:20px;
      box-shadow:0 18px 40px rgba(0,0,0,0.12);
      padding:30px 24px;
      box-sizing:border-box;
    }

    .fp-title{
      margin:0 0 8px;
      text-align:center;
      font-size:28px;
      font-weight:800;
      color:#1f1f1f;
    }

    .fp-sub{
      margin:0 0 18px;
      text-align:center;
      font-size:14px;
      color:#666;
      line-height:1.5;
    }

    .fp-field{
      display:grid;
      gap:8px;
      margin-bottom:14px;
    }

    .fp-field label{
      font-size:14px;
      font-weight:700;
      color:#333;
    }

    .fp-field input{
      width:100%;
      padding:12px 14px;
      border:1px solid #d8d8d8;
      border-radius:10px;
      font-size:14px;
      box-sizing:border-box;
    }

    .fp-field input:focus{
      outline:none;
      border-color:#ff6a00;
      box-shadow:0 0 0 4px rgba(255,106,0,0.12);
    }

    .fp-actions{
      display:grid;
      gap:10px;
    }

    .fp-btn{
      width:100%;
      padding:13px;
      background:linear-gradient(135deg, #ff6a00, #ff8a3d);
      border:none;
      color:#fff;
      font-weight:800;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
    }

    .fp-btn:hover{
      box-shadow:0 8px 18px rgba(255,106,0,0.25);
    }

    .fp-back{
      width:100%;
      padding:12px;
      background:#fff4eb;
      border:1px solid #f0c3a1;
      color:#8a420c;
      font-weight:700;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
    }

    .fp-status{
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      background:#fff8f1;
      border:1px solid #f3d3bc;
      color:#9a3412;
      font-size:14px;
      font-weight:700;
      line-height:1.4;
      display:none;
    }

    .fp-status.show{
      display:block;
    }

    .fp-status.success{
      background:#eef9f0;
      border-color:#b7e4c0;
      color:#18794e;
    }

    .fp-status.error{
      background:#fff1f1;
      border-color:#f0b8b8;
      color:#b42318;
    }
  </style>
</head>
<body>
  <div class="fp-wrap">
    <div class="fp-card">
      <h1 class="fp-title">Forgot Password</h1>
      <p class="fp-sub">
        Enter your email address and we’ll send you a password reset link.
      </p>

      <div class="fp-field">
        <label for="fp-email">Email address</label>
        <input id="fp-email" type="email" placeholder="name@company.com" />
      </div>

      <div class="fp-actions">
        <button class="fp-btn" onclick="sendResetLink()">Send Reset Link</button>
        <button class="fp-back" onclick="window.location.href='./index.html'">Back to Login</button>
      </div>

      <div id="fp-status" class="fp-status"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://vtglfaeyvmciieuntzhs.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY_HERE";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function setStatus(message, type = "") {
      const el = document.getElementById("fp-status");
      el.textContent = message || "";
      el.className = "fp-status show";
      if (type) el.classList.add(type);
    }

    async function sendResetLink() {
      const email = (document.getElementById("fp-email").value || "").trim();

      if (!email) {
        setStatus("Please enter your email address.", "error");
        return;
      }

      setStatus("Sending reset link...", "");

      const redirectTo = `${window.location.origin}${window.location.pathname.replace("forgot-password.html", "reset-password.html")}`;

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo
      });

      if (error) {
        setStatus(error.message || "Failed to send reset link.", "error");
        return;
      }

      setStatus("Password reset link sent. Please check your email.", "success");
    }
  </script>
</body>
</html>
