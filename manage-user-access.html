<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manage User Access</title>
  <link rel="stylesheet" href="./css/styles.css" />

  <style>
  .access-page {
    max-width: 1100px;
    margin: 40px auto;
    padding: 24px;
    background: #fff;
    border: 1px solid #f0ddd0;
    border-radius: 20px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.06);
    overflow: visible;
  }

  .access-page h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 48px;
    margin: 0 0 10px;
    color: #181818;
  }

  .access-page p {
    color: #666;
    margin-bottom: 24px;
    font-size: 15px;
  }

  .access-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .access-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .access-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: #fff;
    border: 1px solid #f0ddd0;
    border-radius: 16px;
    overflow: visible;
    box-shadow: 0 10px 24px rgba(0,0,0,0.06);
  }

  .access-table th {
    background: linear-gradient(180deg, #1c1c1f 0%, #111214 100%);
    color: #fff;
    font-size: 14px;
    font-weight: 800;
    text-align: left;
    padding: 14px 12px;
    border-bottom: 2px solid #ff7a1a;
  }

  .access-table td {
    padding: 14px 12px;
    border-bottom: 1px solid #f3e2d5;
    font-size: 14px;
    color: #222;
    vertical-align: middle;
    overflow: visible;
  }

  .access-table tbody tr {
    position: relative;
  }

  .access-table tbody tr:nth-child(even) {
    background: #fffaf6;
  }

  .status-badge {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
  }

  .status-active {
    background: #ecfdf3;
    color: #027a48;
    border: 1px solid #abefc6;
  }

  .status-disabled {
    background: #fff1f3;
    color: #c01048;
    border: 1px solid #f4b4c2;
  }

  .perm-badge {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    background: #fff4eb;
    color: #8a420c;
    border: 1px solid #f0c3a1;
  }

  .empty-state {
    padding: 24px;
    text-align: center;
    color: #777;
    font-size: 14px;
  }

  .user-action-cell {
    position: relative;
    overflow: visible;
    width: 120px;
  }

  .user-action-btn {
    width: 38px;
    height: 38px;
    border: 1px solid #f0c3a1;
    background: #fff4eb;
    color: #8a420c;
    border-radius: 10px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
  }

  .user-action-btn:hover {
    background: #ff6a00;
    border-color: #ff6a00;
    color: #fff;
  }

  .user-action-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 190px;
    background: #fff;
    border: 1px solid #f0ddd0;
    border-radius: 12px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    padding: 6px;
    z-index: 9999;
  }

  .user-action-menu button {
    width: 100%;
    border: none;
    background: transparent;
    text-align: left;
    padding: 10px 12px;
    border-radius: 8px;
    color: #222;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .user-action-menu button:hover {
    background: #fff1e6;
    color: #8a420c;
  }

  .user-action-menu .danger {
    color: #b42318;
  }

  .user-action-menu .danger:hover {
    background: #fff1f1;
    color: #b42318;
  }
</style>
</head>
<body>
  <div class="access-page">
    <div class="access-topbar">
      <div>
        <h1>Manage User Access</h1>
        <p>View users, access level, status, and basic account controls.</p>
      </div>

      <div class="access-actions">
        <button class="btn-add" onclick="window.location.href='./create-user.html'">Invite User</button>
        <button class="btn" onclick="window.location.href='./index.html'">Back</button>
      </div>
    </div>

    <table class="access-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
          <th>Access</th>
          <th>Last Online</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="user-access-body"></tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://vtglfaeyvmciieuntzhs.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_E1idmqAS85V-IVFdOqqV_w_smrIsLuP";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function formatLastOnline(value) {
      if (!value) return "—";
      const d = new Date(value);
      if (isNaN(d.getTime())) return value;
      return d.toLocaleString();
    }

    function esc(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function closeAllUserMenus() {
      document.querySelectorAll(".user-action-menu").forEach((menu) => {
        menu.style.display = "none";
      });
    }

    function toggleUserMenu(event, userId) {
      event.stopPropagation();

      const menu = document.getElementById(`user-menu-${userId}`);
      if (!menu) return;

      const isOpen = menu.style.display === "block";
      closeAllUserMenus();
      menu.style.display = isOpen ? "none" : "block";
    }

    document.addEventListener("click", function () {
      closeAllUserMenus();
    });

    async function loadUsers() {
      const tbody = document.getElementById("user-access-body");
      if (!tbody) return;

      tbody.innerHTML = `<tr><td colspan="6" class="empty-state">Loading users...</td></tr>`;

      const { data, error } = await sb
        .from("user_access")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">${esc(error.message)}</td></tr>`;
        return;
      }

      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No users found.</td></tr>`;
        return;
      }

      tbody.innerHTML = "";

      data.forEach((user) => {
        const fullName = `${user.first_name || ""} ${user.last_name || ""}`.trim() || "—";
        const statusValue = user.status || "Active";
        const accessValue = user.access_level || "Editor";
        const statusClass = statusValue === "Active" ? "status-active" : "status-disabled";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${esc(fullName)}</td>
          <td>${esc(user.email || "")}</td>
          <td><span class="status-badge ${statusClass}">${esc(statusValue)}</span></td>
          <td><span class="perm-badge">${esc(accessValue)}</span></td>
          <td>${esc(formatLastOnline(user.last_seen_at))}</td>
          <td class="user-action-cell">
            <button class="user-action-btn" onclick="toggleUserMenu(event, '${user.id}')">⋯</button>

            <div class="user-action-menu" id="user-menu-${user.id}" style="display:none;">
              <button onclick="changeUserRole('${user.id}', 'Admin')">Make Admin</button>
              <button onclick="changeUserRole('${user.id}', 'Editor')">Make Editor</button>
              <button onclick="changeUserRole('${user.id}', 'View Only')">Make View Only</button>
              <button onclick="setUserStatus('${user.id}', 'Active')">Set Active</button>
              <button onclick="setUserStatus('${user.id}', 'Disabled')">Set Disabled</button>
              <button class="danger" onclick="removeUser('${esc(user.auth_user_id || "")}', '${esc(user.email || "")}')">Remove</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }
    
async function changeUserRole(userId, roleName) {
  const { error } = await sb
    .from("user_access")
    .update({ access_level: roleName })
    .eq("id", userId);

  if (error) {
    alert(error.message || "Failed to update access level.");
    return;
  }

  closeAllUserMenus();
  loadUsers();
}

async function setUserStatus(userId, newStatus) {
  const { error } = await sb
    .from("user_access")
    .update({ status: newStatus })
    .eq("id", userId);

  if (error) {
    alert(error.message || "Failed to update status.");
    return;
  }

  closeAllUserMenus();
  loadUsers();
}

async function removeUser(authUserId, email) {
  const confirmed = confirm(
    "Delete this account permanently?\n\n" +
    "This will remove the user’s access and permanently delete the account from the system.\n" +
    "The user will no longer be able to sign in, and this account will no longer be found in Exodia Finance.\n" +
    "If they need access again, you will need to invite them again.\n\n" +
    "This action cannot be undone."
  );

  if (!confirmed) return;

  if (!authUserId || !email) {
    alert("This user cannot be deleted yet because the account ID or email is missing.");
    return;
  }

  try {
    const {
      data: { session },
      error: sessionError
    } = await sb.auth.getSession();

    console.log("Session check:", { session, sessionError });
    console.log("Deleting user:", { authUserId, email });

    if (sessionError || !session?.access_token) {
      alert("You must be logged in as admin to delete a user.");
      return;
    }

    const res = await fetch("https://vtglfaeyvmciieuntzhs.supabase.co/functions/v1/delete-user", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${session.access_token}`
      },
      body: JSON.stringify({
        auth_user_id: authUserId,
        email: email
      })
    });

    const payload = await res.json();
    console.log("Delete response:", payload);

    if (!res.ok) {
      alert(payload.error || payload.message || "Failed to delete user.");
      return;
    }

    alert("User account permanently deleted.");
    await loadUsers();
  } catch (err) {
    console.error(err);
    alert("Unexpected error while deleting user.");
  }
}

    loadUsers();
  </script>
</body>
</html>
