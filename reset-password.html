<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    body{
      margin:0;
      font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fff6ef 0%, #ffe2cc 100%);
      min-height:100vh;
    }

    .rp-wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }

    .rp-card{
      width:100%;
      max-width:430px;
      background:#fff;
      border:1px solid #eadfd6;
      border-radius:20px;
      box-shadow:0 18px 40px rgba(0,0,0,0.12);
      padding:30px 24px;
      box-sizing:border-box;
    }

    .rp-title{
      margin:0 0 8px;
      text-align:center;
      font-size:28px;
      font-weight:800;
      color:#1f1f1f;
    }

    .rp-sub{
      margin:0 0 18px;
      text-align:center;
      font-size:14px;
      color:#666;
      line-height:1.5;
    }

    .rp-field{
      display:grid;
      gap:8px;
      margin-bottom:14px;
    }

    .rp-field label{
      font-size:14px;
      font-weight:700;
      color:#333;
    }

    .rp-password-wrap{
      position:relative;
    }

    .rp-field input{
      width:100%;
      padding:12px 44px 12px 14px;
      border:1px solid #d8d8d8;
      border-radius:10px;
      font-size:14px;
      box-sizing:border-box;
    }

    .rp-field input:focus{
      outline:none;
      border-color:#ff6a00;
      box-shadow:0 0 0 4px rgba(255,106,0,0.12);
    }

    .rp-eye{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      background:transparent;
      border:none;
      cursor:pointer;
      font-size:18px;
      line-height:1;
      padding:0;
    }

    .rp-btn{
      width:100%;
      padding:13px;
      background:linear-gradient(135deg, #ff6a00, #ff8a3d);
      border:none;
      color:#fff;
      font-weight:800;
      border-radius:12px;
      cursor:pointer;
      font-size:14px;
    }

    .rp-btn:hover{
      box-shadow:0 8px 18px rgba(255,106,0,0.25);
    }

    .rp-status{
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      background:#fff8f1;
      border:1px solid #f3d3bc;
      color:#9a3412;
      font-size:14px;
      font-weight:700;
      line-height:1.4;
      display:none;
    }

    .rp-status.show{
      display:block;
    }

    .rp-status.success{
      background:#eef9f0;
      border-color:#b7e4c0;
      color:#18794e;
    }

    .rp-status.error{
      background:#fff1f1;
      border-color:#f0b8b8;
      color:#b42318;
    }
  </style>
</head>
<body>
  <div class="rp-wrap">
    <div class="rp-card">
      <h1 class="rp-title">Set New Password</h1>
      <p class="rp-sub">
        Enter your new password below.
      </p>

      <div class="rp-field">
        <label for="rp-password">New password</label>
        <div class="rp-password-wrap">
          <input id="rp-password" type="password" placeholder="Enter new password" />
          <button type="button" class="rp-eye" onclick="togglePassword('rp-password', this)" aria-label="Show password">👁️</button>
        </div>
      </div>

      <div class="rp-field">
        <label for="rp-confirm">Confirm password</label>
        <div class="rp-password-wrap">
          <input id="rp-confirm" type="password" placeholder="Confirm new password" />
          <button type="button" class="rp-eye" onclick="togglePassword('rp-confirm', this)" aria-label="Show password">👁️</button>
        </div>
      </div>

      <button class="rp-btn" onclick="updatePassword()">Update Password</button>

      <div id="rp-status" class="rp-status"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://vtglfaeyvmciieuntzhs.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_E1idmqAS85V-IVFdOqqV_w_smrIsLuP";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function setStatus(message, type = "") {
      const el = document.getElementById("rp-status");
      el.textContent = message || "";
      el.className = "rp-status show";
      if (type) el.classList.add(type);
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (!input) return;

      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "🙈";
        btn.setAttribute("aria-label", "Hide password");
      } else {
        input.type = "password";
        btn.textContent = "👁️";
        btn.setAttribute("aria-label", "Show password");
      }
    }

    async function updatePassword() {
      const password = document.getElementById("rp-password").value || "";
      const confirm = document.getElementById("rp-confirm").value || "";

      if (!password || !confirm) {
        setStatus("Please complete both password fields.", "error");
        return;
      }

      if (password.length < 8) {
        setStatus("Password must be at least 8 characters.", "error");
        return;
      }

      if (password !== confirm) {
        setStatus("Passwords do not match.", "error");
        return;
      }

      setStatus("Updating password...");

      const { error } = await sb.auth.updateUser({
        password: password
      });

      if (error) {
        setStatus(error.message || "Failed to update password.", "error");
        return;
      }

      setStatus("Password updated successfully. Redirecting to login...", "success");

      setTimeout(() => {
        window.location.href = "./index.html";
      }, 1800);
    }
  </script>
</body>
</html>
